name: Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm release (ignored when ref is provided)'
        required: false
        default: "no"
      ref:
        description: "Branch or tag to build (skips versioning and GitHub release — just builds and pushes image)"
        required: false
        default: ""

concurrency:
  group: release-workflow
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ── Stage 1: Determine version / ref to build ─────────────────────────
  version:
    runs-on: ubuntu-latest
    if: github.event.inputs.ref != '' || github.event.inputs.confirm == 'yes'
    outputs:
      tag: ${{ steps.version.outputs.next_version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            echo "next_version=$INPUT_REF" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Using provided ref: $INPUT_REF"
            exit 0
          fi

          echo "is_release=true" >> $GITHUB_OUTPUT

          current_year=$(date +"%Y")
          current_month=$(date +"%-m")
          current_date="${current_year}.${current_month}"

          latest_tag=$(git tag -l "v[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*" | sort -V | tail -1)

          if [ -z "$latest_tag" ]; then
            next_version="v${current_date}.1"
          else
            tag_without_v=${latest_tag#v}
            tag_year_month=${tag_without_v%.*}
            tag_patch=${tag_without_v##*.}

            if [ "$tag_year_month" = "$current_date" ]; then
              next_patch=$((tag_patch + 1))
              next_version="v${current_date}.${next_patch}"
            else
              next_version="v${current_date}.1"
            fi
          fi

          echo "next_version=$next_version" >> $GITHUB_OUTPUT
          echo "Next version: $next_version"

      - name: Verify tag does not exist
        if: steps.version.outputs.is_release == 'true'
        run: |
          tag="${{ steps.version.outputs.next_version }}"
          if git tag -l | grep -q "^${tag}$"; then
            echo "ERROR: Tag $tag already exists"
            exit 1
          fi

      - name: Create and push tag
        if: steps.version.outputs.is_release == 'true'
        run: |
          tag="${{ steps.version.outputs.next_version }}"
          git tag "$tag"
          git push origin "$tag"

  # ── Stage 2: Test + lint (must pass before publishing) ────────────────
  test:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: make fmtcheck
      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84  # v6
        with:
          version: v1.64.8

  # ── Stage 3: Build and push container image ────────────────────────────
  push-image:
    name: Push container image
    runs-on: ubuntu-latest
    needs: [version, test, lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to CF registry
        run: echo "${{ secrets.CF_REGISTRY_PASSWORD }}" | docker login images.runreveal.com -u ${{ secrets.CF_REGISTRY_USERNAME }} --password-stdin
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: |
            ghcr.io/runreveal/reveald
            images.runreveal.com/reveald
          tags: |
            type=raw,value=${{ needs.version.outputs.tag }}
            type=raw,value=latest,enable=${{ needs.version.outputs.is_release == 'true' }}
      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.version.outputs.tag }}

  # ── Stage 4: Publish CLI binaries via goreleaser (releases only) ───────
  release-cli:
    name: Release CLI binaries
    runs-on: ubuntu-latest
    needs: [version, test, lint]
    if: needs.version.outputs.is_release == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.tag }}
      - run: git fetch --force --tags
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
      - name: Install mingw-w64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --config .goreleaser.public.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
